<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro de Eventos</title>
    <style>
      body {
        font-family: "Poppins", Arial, sans-serif;
        background: #f9f9f9;
        max-width: 900px;
        margin: 24px auto;
        padding: 20px;
        color: #222;
      }
      header {
        background-color: #003B70;
        color: white;
        padding: 20px;
        text-align: center;
      }
      header img {
        max-width: 120px;
        height: auto;
        margin: 5px;
      }
      .logo-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
      }
      h1 {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
      }
      h2 {
        margin: 10px 0;
        font-size: 20px;
        font-weight: normal;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 20px;
        margin-bottom: 16px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
      }
      input[type="text"], input[type="date"], select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }
      textarea { min-height: 80px; }
      .hidden { display: none; }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 12px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 10px;
      }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary { background: #4AC66C; color: white; }
      .secondary { background: #A369F8; color: white; }
      .ghost { background: #e0e0e0; }
      #msg {
        text-align: center;
        margin-top: 10px;
        font-weight: 500;
      }
      .invalid {
        border-color: #d93025 !important;
        background: #feecec !important;
      }
      #msg.success { color: #4AC66C; }
      #msg.error { color: red; }
    </style>
  </head>
  <body>
   <header>
    <h1>Formulario de Registro de Eventos</h1>
    <h2>Comida Segura - Calidad Arcoprime</h2>
  </header>

    <!-- DATOS GENERALES -->
    <div class="card">
      <h3>Datos Generales</h3>
      <div class="row">
        <div>
          <label for="tienda">Tienda</label>
          <input list="tiendaList" id="tienda" placeholder="Escribe el nombre del local" autocomplete="off" required>
          <datalist id="tiendaList"></datalist> 
        </div>
        <div>
          <label for="fecha">Fecha del evento</label>
          <input type="date" id="fecha" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="nombre">Nombre y Apellido *</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo" required>
        </div>
        <div>
          <label for="apellido">Cargo *</label>
          <input type="text" id="apellido" placeholder="Cargo" required>
        </div>
      </div>
      <div>
        <label for="tipoEvento">Tipo de Evento</label>
        <select id="tipoEvento" required>
          <option value="">Selecciona...</option>
        </select>
      </div>
    </div>

    <!-- BLOQUE PLAGA -->
    <div id="blkPlaga" class="card hidden">
      <h3>Detalle - Plaga</h3>
      <div class="row">
        <div>
          <label for="tipoPlaga">Tipo de Plaga</label>
          <select id="tipoPlaga" required></select>
        </div>
        <div>
          <label for="tipoEventoPlaga">Tipo de Evento Plaga</label>
          <select id="tipoEventoPlaga" required></select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="sector">Sector del Hallazgo</label>
          <select id="sector" required></select>
        </div>
        <div>
          <label for="comentarioPlaga">Comentario</label>
          <textarea id="comentarioPlaga" placeholder="Describe brevemente lo encontrado..." required></textarea>
        </div>
      </div>
      <div id="plagaExtras" class="card" style="margin-top:12px; display:none;"></div>
    </div>

    <!-- BLOQUE AROMA -->
    <div id="blkAroma" class="card hidden">
      <h3>Detalle - Aroma</h3>
      <div class="row">
        <div>
          <label for="aromaCat">Categoría</label>
          <select id="aromaCat" required></select>
        </div>
        <div>
          <label for="comentarioAroma">Comentario</label>
          <textarea id="comentarioAroma" placeholder="Observaciones..." required></textarea>
        </div>
      </div>
    </div>

    <!-- BLOQUE QUIMICO -->
    <div id="blkQuimico" class="card hidden">
      <h3>Detalle - Químico</h3>
      <div class="row">
        <div>
          <label for="quimCat">Categoría</label>
          <select id="quimCat" required></select>
        </div>
        <div>
          <label for="comentarioQuim">Comentario</label>
          <textarea id="comentarioQuim" placeholder="Observaciones..." required></textarea>
        </div>
      </div>
    </div>

    <!-- BOTONES -->
    <div class="actions">
      <button class="ghost" type="button" onclick="limpiar()">Limpiar</button>
      <button class="primary" type="button" onclick="enviar()">Enviar</button>
    </div>

    <p id="msg"></p>

    <script>
      let TIENDAS = [];
      let ALL_TIPO_EVENTO_PLAGA = [];  // Guardaremos el catálogo completo

      // Función para cargar los datos iniciales
      function byId(id){ return document.getElementById(id); }

      // Cargar catálogos al iniciar
      google.script.run.withSuccessHandler(initUI).getInitData();

      function initUI(data) {
        TIENDAS = data.tiendas || [];
        
        // Verificar si data.tipoEventoPlaga contiene las categorías correctamente
        if (data.tipoEventoPlaga && Array.isArray(data.tipoEventoPlaga)) {
          ALL_TIPO_EVENTO_PLAGA = data.tipoEventoPlaga;
          renderTipoEventoPlaga();  // Llamamos a la función después de cargar las categorías.
        } else {
          console.error('No se cargaron las opciones de tipoEventoPlaga.');
        }

        const dl = byId('tiendaList');
        dl.innerHTML = '';
        TIENDAS.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.nombre;
          dl.appendChild(opt);
        });

        const te = byId('tipoEvento');
        te.innerHTML = '<option value="">Selecciona...</option>';
        (data.tipoEvento || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          te.appendChild(opt);
        });

        const tp = byId('tipoPlaga');
        tp.innerHTML = '<option value="">Selecciona...</option>';
        (data.tipoPlaga || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          tp.appendChild(opt);
        });

        const sc = byId('sector');
        sc.innerHTML = '<option value="">Selecciona...</option>';
        (data.sectores || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          sc.appendChild(opt);
        });

        const ac = byId('aromaCat');
        ac.innerHTML = '<option value="">Selecciona...</option>';
        (data.catAroma || []).forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v; ac.appendChild(o);
        });

        const qc = byId('quimCat');
        qc.innerHTML = '<option value="">Selecciona...</option>';
        (data.catQuimico || []).forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v; qc.appendChild(o);
        });

        te.addEventListener('change', onTipoEventoChange);
        tp.addEventListener('change', renderTipoEventoPlaga);
      }

      function renderTipoEventoPlaga() {
        const sel = byId('tipoEventoPlaga');
        const current = sel.value;
        const plagaCode = byId('tipoPlaga').value;  // Valor del tipo de plaga seleccionada (r1, c5, m4, etc.)

        const permitidas = allowedTipoEventoPlagaFor(plagaCode);  // Filtra las opciones según el tipo de plaga

        // Limpiar el select
        sel.innerHTML = '';
        const opt0 = document.createElement('option');
        opt0.value = '';
        opt0.textContent = 'Selecciona...';
        sel.appendChild(opt0);

        // Añadir las opciones filtradas
        permitidas.forEach(v => {
          const o = document.createElement('option');
          o.value = v;
          o.textContent = v;
          sel.appendChild(o);
        });

        // Si la selección anterior sigue siendo válida, la dejamos
        if (permitidas.includes(current)) {
          sel.value = current;
        } else {
          sel.value = '';  // Reseteamos la selección si no es válida
        }
      }

      function allowedTipoEventoPlagaFor(plagaCodeRaw) {
        const code = String(plagaCodeRaw || '').trim().toLowerCase();

        // Listas de las opciones según el código de plaga
        const SOLO_CTC_VL_NM = ['Captura/Trampa/Cadaver', 'Vivo/Libre', 'Nido/Madriguera'];  // Para C5
        const SOLO_CTC_VL   = ['Captura/Trampa/Cadaver', 'Vivo/Libre'];  // Para M4, H4, P1

        if (code === 'r1') return ALL_TIPO_EVENTO_PLAGA;  // Para R1, mostrar todas las categorías
        if (code === 'c5') return SOLO_CTC_VL_NM;        // Para C5, solo 3 categorías
        if (['m4', 'h4', 'p1'].includes(code)) return SOLO_CTC_VL;  // Para M4, H4, P1, solo 2 categorías
        return ALL_TIPO_EVENTO_PLAGA;  // Para otro valor, mostrar todas las categorías
      }

      function onTipoEventoChange(){
        const tipo = byId('tipoEvento').value;
        toggle(byId('blkPlaga'), tipo === 'Plaga');
        toggle(byId('blkAroma'), tipo === 'Aroma');
        toggle(byId('blkQuimico'), tipo === 'Químico');
      }

      function toggle(el, show){ el.classList.toggle('hidden', !show); }

      // Resto de funciones de validación y envío (no cambiadas)
    </script>
  </body>
</html>
