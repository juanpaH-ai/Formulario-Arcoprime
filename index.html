<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro de Eventos</title>
    <style>
      body {
        font-family: "Poppins", Arial, sans-serif;
        background: #f9f9f9;
        max-width: 900px;
        margin: 24px auto;
        padding: 20px;
        color: #222;
      }
      header {
        background-color: #003B70;
        color: white;
        padding: 20px;
        text-align: center;
      }
      header img {
        max-width: 120px;
        height: auto;
        margin: 5px;
      }
      .logo-container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 15px;
      }
      h1 {
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
      }
      h2 {
        margin: 10px 0;
        font-size: 20px;
        font-weight: normal;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        padding: 20px;
        margin-bottom: 16px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 6px;
      }
      input[type="text"], input[type="date"], select, textarea {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
      }
      textarea { min-height: 80px; }
      .hidden { display: none; }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 12px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 10px;
      }
      button {
        padding: 10px 18px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
      }
      .primary { background: #4AC66C; color: white; }
      .secondary { background: #A369F8; color: white; }
      .ghost { background: #e0e0e0; }
      #msg {
        text-align: center;
        margin-top: 10px;
        font-weight: 500;
      }
      .invalid {
        border-color: #d93025 !important;
        background: #feecec !important;
      }
      #msg.success { color: #4AC66C; }
      #msg.error { color: red; }

      /* ── NUEVO: Botones Certificado ── */
      .cert-options { display: flex; gap: 12px; margin-bottom: 12px; }
      .cert-btn {
        flex: 1;
        padding: 10px;
        border: 2px solid #ccc;
        border-radius: 8px;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all .2s;
        color: #555;
      }
      .cert-btn.active-si { background: #4AC66C; border-color: #4AC66C; color: #fff; }
      .cert-btn.active-no { background: #e53935; border-color: #e53935; color: #fff; }

      /* ── NUEVO: Zona de fotos ── */
      .foto-zone {
        border: 2px dashed #b0bec5;
        border-radius: 10px;
        padding: 18px;
        text-align: center;
        cursor: pointer;
        transition: border-color .2s;
        background: #fafafa;
      }
      .foto-zone:hover { border-color: #003B70; }
      .foto-zone p { margin: 4px 0; color: #888; font-size: 14px; }
      .foto-previews { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
      .foto-thumb { position: relative; width: 90px; height: 90px; }
      .foto-thumb img {
        width: 90px; height: 90px;
        object-fit: cover;
        border-radius: 8px;
        border: 1px solid #ddd;
      }
      .foto-thumb .remove-foto {
        position: absolute; top: -6px; right: -6px;
        background: #e53935; color: white;
        border: none; border-radius: 50%;
        width: 22px; height: 22px;
        font-size: 13px; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        padding: 0; font-weight: bold;
      }
      .foto-count { font-size: 13px; color: #888; margin-top: 6px; }
    </style>
  </head>
  <body>
  <header>
    <div class="logo-container">
      <img src="/logos/arcoprime.jpg" alt="Arcoprime" style="max-width:80px; height:auto; opacity:0.9;">
      <div style="text-align:center; flex:1;">
        <img src="/logos/comida-segura.jpg" alt="Comida Segura" style="max-width:70px; height:auto; opacity:0.9;">
      </div>
      <img src="/logos/copec.jpg" alt="Copec" style="max-width:80px; height:auto; opacity:0.9;">
    </div>
    <h1 style="margin-top:14px; font-size:26px; font-weight:700; letter-spacing:0.3px;">Formulario de Registro de Eventos</h1>
    <h2 style="font-size:15px; font-weight:400; opacity:0.85; margin-top:4px;">Comida Segura - Calidad Arcoprime</h2>
  </header>

    <!-- DATOS GENERALES -->
    <div class="card">
      <h3>Datos Generales</h3>
      <div class="row">
        <div>
          <label for="tienda">Tienda</label>
          <input list="tiendaList" id="tienda" placeholder="Escribe el nombre del local" autocomplete="off" required>
          <datalist id="tiendaList"></datalist> 
        </div>
        <div>
          <label for="fecha">Fecha del evento</label>
          <input type="date" id="fecha" required>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="nombre">Nombre y Apellido *</label>
          <input type="text" id="nombre" placeholder="Tu nombre completo" required>
        </div>
        <div>
          <label for="apellido">Cargo *</label>
          <input type="text" id="apellido" placeholder="Cargo" required>
        </div>
      </div>
      <div>
        <label for="tipoEvento">Tipo de Evento</label>
        <select id="tipoEvento" required>
          <option value="">Selecciona...</option>
        </select>
      </div>
    </div>

    <!-- BLOQUE PLAGA -->
    <div id="blkPlaga" class="card hidden">
      <h3>Detalle - Plaga</h3>

      <!-- NUEVO: Llegó el certificado -->
      <div>
        <label>¿Llegó el certificado?</label>
        <div class="cert-options">
          <button type="button" class="cert-btn" id="certPlagaSi" onclick="setCert('plaga','Sí')">✅ Sí</button>
          <button type="button" class="cert-btn" id="certPlagaNo" onclick="setCert('plaga','No')">❌ No</button>
        </div>
      </div>

      <div class="row">
        <!-- NUEVO: Proveedor Plaga -->
        <div>
          <label for="proveedorPlaga">Proveedor</label>
          <!-- ✏️ Para cambiar proveedores de Plaga: edita las <option> de este select -->
          <select id="proveedorPlaga">
            <option value="">Selecciona...</option>
            <option value="Orkin">Orkin</option>
            <option value="Ecolab">Ecolab</option>
          </select>
        </div>
        <div>
          <label for="tipoPlaga">Tipo de Plaga</label>
          <select id="tipoPlaga" required></select>
        </div>
      </div>

      <div class="row">
        <div>
          <label for="tipoEventoPlaga">Tipo de Evento Plaga</label>
          <select id="tipoEventoPlaga" required></select>
        </div>
        <div>
          <label for="sector">Sector del Hallazgo</label>
          <select id="sector" required></select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="comentarioPlaga">Comentario</label>
          <textarea id="comentarioPlaga" placeholder="Describe brevemente lo encontrado..." required></textarea>
        </div>
      </div>
      <div id="plagaExtras" class="card" style="margin-top:12px; display:none;"></div>
    </div>

    <!-- BLOQUE AROMA -->
    <div id="blkAroma" class="card hidden">
      <h3>Detalle - Aroma</h3>
      <div class="row">
        <!-- NUEVO: Proveedor Aroma -->
        <div>
          <label for="proveedorAroma">Proveedor</label>
          <!-- ✏️ Para cambiar proveedores de Aroma: edita las <option> de este select -->
          <select id="proveedorAroma">
            <option value="">Selecciona...</option>
            <option value="Por definir">Por definir</option>
          </select>
        </div>
        <div>
          <label for="aromaCat">Categoría</label>
          <select id="aromaCat" required></select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="comentarioAroma">Comentario</label>
          <textarea id="comentarioAroma" placeholder="Observaciones..." required></textarea>
        </div>
      </div>
    </div>

    <!-- BLOQUE QUIMICO -->
    <div id="blkQuimico" class="card hidden">
      <h3>Detalle - Químico</h3>

      <!-- NUEVO: Llegó el certificado -->
      <div>
        <label>¿Llegó el certificado?</label>
        <div class="cert-options">
          <button type="button" class="cert-btn" id="certQuimSi" onclick="setCert('quimico','Sí')">✅ Sí</button>
          <button type="button" class="cert-btn" id="certQuimNo" onclick="setCert('quimico','No')">❌ No</button>
        </div>
      </div>

      <div class="row">
        <!-- NUEVO: Proveedor Químico -->
        <div>
          <label for="proveedorQuimico">Proveedor</label>
          <!-- ✏️ Para cambiar proveedores de Químico: edita las <option> de este select -->
          <select id="proveedorQuimico">
            <option value="">Selecciona...</option>
            <option value="Por definir">Por definir</option>
          </select>
        </div>
        <div>
          <label for="quimCat">Categoría</label>
          <select id="quimCat" required></select>
        </div>
      </div>
      <div class="row">
        <div>
          <label for="comentarioQuim">Comentario</label>
          <textarea id="comentarioQuim" placeholder="Observaciones..." required></textarea>
        </div>
      </div>
    </div>

    <!-- NUEVO: BLOQUE FOTOS (aparece al elegir cualquier tipo de evento) -->
    <div id="blkFotos" class="card hidden">
      <h3>Fotos <span style="font-weight:400; font-size:14px; color:#888;">(opcional)</span></h3>
      <div class="foto-zone" onclick="byId('fotoInput').click()">
        <p>📷 Toca aquí para agregar fotos</p>
        <p>Se permiten múltiples imágenes (JPG, PNG, WEBP)</p>
      </div>
      <input type="file" id="fotoInput" accept="image/*" multiple style="display:none" onchange="onFotosSelected(event)">
      <div class="foto-previews" id="fotoPreviews"></div>
      <p class="foto-count" id="fotoCount"></p>
    </div>

    <!-- BOTONES -->
    <div class="actions">
      <button class="ghost" type="button" onclick="limpiar()">Limpiar</button>
      <button class="primary" type="button" onclick="enviar()">Enviar</button>
    </div>

    <p id="msg"></p>

    <script>
      let TIENDAS = [];
      let ALL_TIPO_EVENTO_PLAGA = [];
      let fotosSeleccionadas = [];
      let certState = { plaga: '', quimico: '' };

      function byId(id){ return document.getElementById(id); }

      // ── Carga inicial desde API de Vercel (reemplaza google.script.run) ──
      async function cargarCatalogos() {
        try {
          const res  = await fetch('/api/init');
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || 'Error desconocido');
          initUI(data);
        } catch(err) {
          byId('msg').textContent = '❌ Error cargando catálogos: ' + err.message;
          byId('msg').className = 'error';
        }
      }

      cargarCatalogos();

      function initUI(data) {
        TIENDAS = data.tiendas || [];
        
        if (data.tipoEventoPlaga && Array.isArray(data.tipoEventoPlaga)) {
          ALL_TIPO_EVENTO_PLAGA = data.tipoEventoPlaga;
          renderTipoEventoPlaga();
        } else {
          console.error('No se cargaron las opciones de tipoEventoPlaga.');
        }

        const dl = byId('tiendaList');
        dl.innerHTML = '';
        TIENDAS.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.nombre;
          dl.appendChild(opt);
        });

        const te = byId('tipoEvento');
        te.innerHTML = '<option value="">Selecciona...</option>';
        (data.tipoEvento || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          te.appendChild(opt);
        });

        const tp = byId('tipoPlaga');
        tp.innerHTML = '<option value="">Selecciona...</option>';
        (data.tipoPlaga || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          tp.appendChild(opt);
        });

        const sc = byId('sector');
        sc.innerHTML = '<option value="">Selecciona...</option>';
        (data.sectores || []).forEach(v => {
          const opt = document.createElement('option');
          opt.value = v;
          opt.textContent = v;
          sc.appendChild(opt);
        });

        const ac = byId('aromaCat');
        ac.innerHTML = '<option value="">Selecciona...</option>';
        (data.catAroma || []).forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v; ac.appendChild(o);
        });

        const qc = byId('quimCat');
        qc.innerHTML = '<option value="">Selecciona...</option>';
        (data.catQuimico || []).forEach(v => {
          const o = document.createElement('option');
          o.value = v; o.textContent = v; qc.appendChild(o);
        });

        te.addEventListener('change', onTipoEventoChange);
        tp.addEventListener('change', renderTipoEventoPlaga);
      }

      function renderTipoEventoPlaga() {
        const sel = byId('tipoEventoPlaga');
        const current = sel.value;
        const plagaCode = byId('tipoPlaga').value;

        const permitidas = allowedTipoEventoPlagaFor(plagaCode);

        sel.innerHTML = '';
        const opt0 = document.createElement('option');
        opt0.value = '';
        opt0.textContent = 'Selecciona...';
        sel.appendChild(opt0);

        permitidas.forEach(v => {
          const o = document.createElement('option');
          o.value = v;
          o.textContent = v;
          sel.appendChild(o);
        });

        if (permitidas.includes(current)) {
          sel.value = current;
        } else {
          sel.value = '';
        }
      }

      function allowedTipoEventoPlagaFor(plagaCodeRaw) {
        const code = String(plagaCodeRaw || '').trim().toLowerCase();
        const SOLO_CTC_VL_NM = ['Captura/Trampa/Cadaver', 'Vivo/Libre', 'Nido/Madriguera'];
        const SOLO_CTC_VL   = ['Captura/Trampa/Cadaver', 'Vivo/Libre'];
        if (code === 'r1') return ALL_TIPO_EVENTO_PLAGA;
        if (code === 'c5') return SOLO_CTC_VL_NM;
        if (['m4', 'h4', 'p1'].includes(code)) return SOLO_CTC_VL;
        return ALL_TIPO_EVENTO_PLAGA;
      }

      function onTipoEventoChange(){
        const tipo = byId('tipoEvento').value;
        toggle(byId('blkPlaga'),   tipo === 'Plaga');
        toggle(byId('blkAroma'),   tipo === 'Aroma');
        toggle(byId('blkQuimico'), tipo === 'Químico');
        toggle(byId('blkFotos'),   tipo !== '');
        // Resetear estado certificado al cambiar tipo
        certState = { plaga: '', quimico: '' };
        resetCertBtns();
      }

      function toggle(el, show){ el.classList.toggle('hidden', !show); }

      // ── NUEVO: Certificado ──
      function setCert(tipo, valor) {
        certState[tipo] = valor;
        resetCertBtns();
      }

      function resetCertBtns() {
        ['certPlagaSi','certPlagaNo','certQuimSi','certQuimNo'].forEach(id => {
          const el = byId(id);
          if (el) el.classList.remove('active-si','active-no');
        });
        if (certState.plaga   === 'Sí') byId('certPlagaSi')?.classList.add('active-si');
        if (certState.plaga   === 'No') byId('certPlagaNo')?.classList.add('active-no');
        if (certState.quimico === 'Sí') byId('certQuimSi')?.classList.add('active-si');
        if (certState.quimico === 'No') byId('certQuimNo')?.classList.add('active-no');
      }

      // ── NUEVO: Fotos ──
      function onFotosSelected(event) {
        const files = Array.from(event.target.files);
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = e => {
            // Guardamos tanto el File real (para enviar) como el base64 (para preview)
            fotosSeleccionadas.push({ file: file, base64: e.target.result, name: file.name, type: file.type });
            renderPreviews();
          };
          reader.readAsDataURL(file);
        });
        event.target.value = '';
      }

      function renderPreviews() {
        const container = byId('fotoPreviews');
        container.innerHTML = '';
        fotosSeleccionadas.forEach((foto, i) => {
          const thumb = document.createElement('div');
          thumb.className = 'foto-thumb';
          thumb.innerHTML = `
            <img src="${foto.base64}" alt="foto ${i+1}">
            <button class="remove-foto" onclick="removeFoto(${i})" title="Eliminar">×</button>
          `;
          container.appendChild(thumb);
        });
        byId('fotoCount').textContent = fotosSeleccionadas.length > 0
          ? `${fotosSeleccionadas.length} foto${fotosSeleccionadas.length > 1 ? 's' : ''} seleccionada${fotosSeleccionadas.length > 1 ? 's' : ''}`
          : '';
      }

      function removeFoto(index) {
        fotosSeleccionadas.splice(index, 1);
        renderPreviews();
      }

      // ── Limpiar ──
      function limpiar() {
        ['tienda','fecha','nombre','apellido',
         'comentarioPlaga','comentarioAroma','comentarioQuim'].forEach(id => {
          const el = byId(id); if (el) el.value = '';
        });
        ['tipoEvento','tipoPlaga','tipoEventoPlaga','sector',
         'aromaCat','quimCat','proveedorPlaga','proveedorAroma','proveedorQuimico'].forEach(id => {
          const el = byId(id); if (el) el.value = '';
        });
        ['blkPlaga','blkAroma','blkQuimico','blkFotos'].forEach(id =>
          byId(id)?.classList.add('hidden')
        );
        fotosSeleccionadas = [];
        renderPreviews();
        certState = { plaga: '', quimico: '' };
        resetCertBtns();
        byId('msg').textContent = '';
        byId('msg').className = '';
      }

      // ── Enviar ──
      async function enviar() {
        const msgEl = byId('msg');
        const tipo  = byId('tipoEvento').value;
        const tipoN = tipo.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        if (!byId('tienda').value.trim())   return showError('El campo Tienda es obligatorio.');
        if (!byId('fecha').value)            return showError('La fecha del evento es obligatoria.');
        if (!byId('nombre').value.trim())   return showError('El campo Nombre es obligatorio.');
        if (!byId('apellido').value.trim()) return showError('El campo Cargo es obligatorio.');
        if (!tipo)                           return showError('Debes seleccionar un Tipo de Evento.');

        msgEl.textContent = '⏳ Enviando...';
        msgEl.className = '';

        let proveedor = '';
        let llegoCert = '';
        if (tipoN === 'plaga')   { proveedor = byId('proveedorPlaga').value;   llegoCert = certState.plaga; }
        if (tipoN === 'aroma')   { proveedor = byId('proveedorAroma').value; }
        if (tipoN === 'quimico') { proveedor = byId('proveedorQuimico').value; llegoCert = certState.quimico; }

        // Usar FormData con archivos reales (igual que formulario vencidos)
        const fd = new FormData();
        fd.append('Tienda_Nombre',     byId('tienda').value.trim());
        fd.append('Fecha_Evento',      byId('fecha').value);
        fd.append('Nombre',            byId('nombre').value.trim());
        fd.append('Apellido',          byId('apellido').value.trim());
        fd.append('Tipo_Evento',       tipo);
        fd.append('Proveedor',         proveedor);
        fd.append('Llego_Certificado', llegoCert);
        fd.append('Tipo_Evento_Plaga', byId('tipoEventoPlaga').value);
        fd.append('Tipo_Plaga',        byId('tipoPlaga').value);
        fd.append('Sector_Hallazgo',   byId('sector').value);
        fd.append('Comentario_Plaga',  byId('comentarioPlaga').value);
        fd.append('Comentario_Aroma',  byId('comentarioAroma').value);
        fd.append('Comentario_Quimico', byId('comentarioQuim').value);

        // Adjuntar fotos como archivos reales (no base64)
        fotosSeleccionadas.forEach((foto, i) => {
          fd.append(`foto${i}`, foto.file, foto.name);
        });

        try {
          const res  = await fetch('/api/submit', { method: 'POST', body: fd });
          const data = await res.json();
          if (!data.ok) throw new Error(data.error || 'Error al enviar');
          msgEl.textContent = `✅ Formulario enviado correctamente. Ticket: ${data.Ticket}`;
          msgEl.className = 'success';
          limpiar();
        } catch (err) {
          showError('Error al enviar: ' + err.message);
        }
      }

      function showError(msg) {
        const el = byId('msg');
        el.textContent = '⚠️ ' + msg;
        el.className = 'error';
      }
    </script>
  </body>
</html>
